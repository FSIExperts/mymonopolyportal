<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Monopoly Portal</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0a0a0a;
    font-family:Georgia,serif;
    color:#d4af37;
}

.portal{
    text-align:center;
    width:340px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

p{
    letter-spacing:4px;
    font-size:12px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    text-align:center;
    background:#111;
    border:1px solid #444;
    color:white;
    margin-bottom:14px;
}

button{
    width:100%;
    padding:14px;
    background:#c9a84c;
    border:none;
    cursor:pointer;
    letter-spacing:3px;
}
</style>
</head>

<body>

<div class="portal">

<h1>My Monopoly Portal</h1>
<p>PORTFOLIO ACCESS</p>

<input id="pw" type="password" placeholder="access code" autofocus>

<button onclick="enterPortal()">ENTER PORTAL</button>

</div>

<script>

function enterPortal(){

    var code = document.getElementById("pw").value;

    if(code === "bellaire2025"){
        window.location.href = "tara-river-homes-cards.html";
    } else {
        alert("incorrect code");
    }
}

document.getElementById("pw").addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        enterPortal();
    }
});

</script>

</body>
</html>
