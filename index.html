<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Monopoly Portal</title>
<style>
body{
    background:#0b0b0b;
    color:#e5d3a3;
    font-family: Georgia, "Times New Roman", serif;
    height:100vh;
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
}

.portal{
    text-align:center;
    border:1px solid rgba(255,255,255,0.15);
    padding:60px;
    border-radius:10px;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

input{
    padding:12px;
    width:220px;
    text-align:center;
    background:#111;
    border:1px solid rgba(255,255,255,0.25);
    color:white;
}

button{
    margin-top:12px;
    padding:10px 30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="portal">
<h1>My Monopoly Portal</h1>
<p>Enter Access Code</p>

<input id="code" type="password" autofocus>

<br>

<button onclick="login()">Enter</button>
</div>

<script>

function login(){

    const pass = document.getElementById("code").value;

    if(pass === "tara"){
        window.location.href = "tara-river-homes-cards.html";
    } else {
        alert("Incorrect code");
    }

}

document.getElementById("code").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        login();
    }
});

</script>

</body>
</html>
